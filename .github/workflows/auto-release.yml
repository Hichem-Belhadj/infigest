name: Auto Release via PR

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  prepare-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get release bump from PR labels
        id: bump
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name')
          echo "Labels: $LABELS"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No valid release label found."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump version in package.json
        id: versioning
        run: |
          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version

          VERSION=$(jq -r .version package.json)
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push release branch
        run: |
          BRANCH="release/v${{ steps.versioning.outputs.new_version }}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json || true
          git commit -m "chore: bump version to v${{ steps.versioning.outputs.new_version }}"
          git push origin "$BRANCH" --force

      - name: Create Pull Request for version bump
        run: |
          LABEL="release:${{ steps.bump.outputs.bump }}"
          BRANCH="release/v${{ steps.versioning.outputs.new_version }}"

          gh pr create \
            --title "chore: release v${{ steps.versioning.outputs.new_version }}" \
            --body "Auto-generated PR for release." \
            --base develop \
            --head "$BRANCH" \
            --label "autorelease" \
            --label "$LABEL"
