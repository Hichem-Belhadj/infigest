name: Release Auto

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write # pour push tag et commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get labels and determine version bump
        id: version
        run: |
          LABELS=$(jq -r '.pull_request.labels[].name' <<< "${{ toJson(github.event) }}")
          echo "Detected labels: $LABELS"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "Aucun label reconnu, bump patch par défaut"
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        run: |
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json || true
          git commit -m "chore(release): bump version"

      - name: Push commit
        run: git push origin HEAD:develop
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}
