name: Release Auto

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write  # pour push commits & tags

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Récupérer les labels et déterminer le bump
        id: version
        env:
          GITHUB_EVENT_JSON: ${{ toJson(github.event) }}
        run: |
          LABELS=$(echo "$GITHUB_EVENT_JSON" | jq -r '.pull_request.labels[].name')
          echo "Detected labels: $LABELS"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "No matching label found, defaulting to patch."
          fi

      - name: Bump version (no tag)
        run: |
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json || true
          git commit -m "chore(release): bump version"

      - name: Push commit to develop
        run: git push origin HEAD:develop
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Lire la version dans package.json
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag Git
        run: |
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}
