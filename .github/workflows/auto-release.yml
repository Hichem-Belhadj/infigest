name: Auto Tag and Release on Merge to Develop branch (with PR Label)

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: read

jobs:
  tag-release:
    name: Tag and Release based on PR label
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current PR from commit
        uses: 8BitJonny/gh-get-current-pr@3.0.0
        id: PR
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ github.sha }}
          filterOutClosed: true
          filterOutDraft: true

      - name: Get PR labels
        id: pr_labels
        run: |
          labels=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.PR.outputs.number }}/labels \
            | jq -r '.[].name' | tr '\n' ' ')
          echo "labels=$labels" >> "$GITHUB_OUTPUT"

      - name: Debug PR Labels (facultatif)
        run: |
          echo "Labels: $LABELS"
        env:
          LABELS: ${{ steps.pr_labels.outputs.labels }}

      - name: Determine bump type
        id: bump_type
        run: |
          LABELS="${{ steps.pr_labels.outputs.labels }}"
          echo "Detected labels: $LABELS"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No recognized label, default bump = patch"
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package.json version
        id: bump_package
        run: |
          echo "Current version:"
          cat package.json | jq .version

          current_version=$(jq -r .version package.json)
          bump=${{ steps.bump_type.outputs.bump }}

          echo "Bump type: $bump"
          echo "Current version: $current_version"

          npm version $bump --no-git-tag-version

          echo "New version:"
          cat package.json | jq .version

          new_version=$(jq -r .version package.json)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit package.json version bump
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump_package.outputs.new_version }}"
          git push

      - name: Create git tag
        run: |
          new_tag="v${{ steps.bump_package.outputs.new_version }}"
          git tag "$new_tag"
          git push origin "$new_tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump_package.outputs.new_version }}
          name: Release v${{ steps.bump_package.outputs.new_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
