name: Auto Bump & Tag

on:
  pull_request:
    types: [labeled, opened, synchronize]
    branches:
      - develop

jobs:
  auto-bump:
    if: contains(toJson(github.event.pull_request.labels), 'release:')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine bump level
        id: bump
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name')
          echo "Detected labels: $LABELS"
          if echo "$LABELS" | grep -q "release:major"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION_BEFORE=$(jq -r .version package.json)
          BRANCH_NAME="release/bump-${VERSION_BEFORE}-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV

          npm version ${{ steps.bump.outputs.bump }}

      - name: Push commit and tag
        run: |
          git push origin "$branch_name"
          git push origin --tags

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          title: "Release ${{ steps.bump.outputs.bump }}"
          body: "Auto-generated PR for version bump based on PR labels."
          base: develop
          head: ${{ env.branch_name }}
