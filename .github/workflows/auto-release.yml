name: Auto Release

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get release bump from label
        id: bump
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name')
          echo "Labels: $LABELS"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No valid release label found."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump version in package.json
        id: versioning
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.bump }}"
          echo "Bumping version with: $BUMP_TYPE"

          npm version $BUMP_TYPE --no-git-tag-version

          VERSION=$(jq -r .version package.json)
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create temp branch
        run: |
          BRANCH="release/v${{ steps.versioning.outputs.new_version }}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json || true
          git commit -m "chore: bump version to v${{ steps.versioning.outputs.new_version }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        run: |
          gh pr create \
            --title "chore: release v${{ steps.versioning.outputs.new_version }}" \
            --body "Auto-generated PR for release." \
            --base develop \
            --head "release/v${{ steps.versioning.outputs.new_version }}" \
            --label "autorelease"

      - name: Create Git tag and release
        if: ${{ false }} # Désactivé tant que la PR sur develop n'est pas mergée
        run: |
          git tag "v${{ steps.versioning.outputs.new_version }}"
          git push origin "v${{ steps.versioning.outputs.new_version }}"

          gh release create "v${{ steps.versioning.outputs.new_version }}" \
            --title "v${{ steps.versioning.outputs.new_version }}" \
            --notes "Release auto from PR #${{ github.event.pull_request.number }}"
